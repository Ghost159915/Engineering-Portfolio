<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" width="840" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d11"/>
      <stop offset="100%" stop-color="#141821"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a52"/>
      <stop offset="100%" stop-color="#ff4f1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="480" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#f5f6f8" stroke-width="1">
    <line x1="0" y1="80" x2="840" y2="80"/>
    <line x1="0" y1="160" x2="840" y2="160"/>
    <line x1="0" y1="240" x2="840" y2="240"/>
    <line x1="0" y1="320" x2="840" y2="320"/>
    <line x1="0" y1="400" x2="840" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="360" y1="0" x2="360" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
  </g>

  <!-- Left panel: image inspection area -->
  <rect x="40" y="60" width="340" height="280" rx="12" fill="#141821" stroke="rgba(245,246,248,0.12)" stroke-width="1"/>

  <!-- Simulated greyscale image inside panel -->
  <rect x="60" y="80" width="300" height="240" rx="6" fill="#1e2430"/>

  <!-- Surface texture simulation (capsule-like object) -->
  <ellipse cx="210" cy="200" rx="100" ry="80" fill="#2a3040" opacity="0.8"/>
  <ellipse cx="210" cy="200" rx="85" ry="65" fill="#222836" opacity="0.9"/>

  <!-- Defect bounding boxes -->
  <!-- Crack defect - red/high severity -->
  <rect x="160" y="155" width="80" height="50" rx="3" fill="none" stroke="#ef4444" stroke-width="2" filter="url(#glow)" opacity="0.9"/>
  <rect x="160" y="140" width="90" height="16" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="163" y="152" font-family="IBM Plex Sans, monospace" font-size="9" fill="white" font-weight="600">crack (high) 94%</text>

  <!-- Scratch defect - amber/medium severity -->
  <rect x="255" y="190" width="60" height="40" rx="3" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.85"/>
  <rect x="255" y="175" width="75" height="16" rx="2" fill="#f59e0b" opacity="0.85"/>
  <text x="258" y="187" font-family="IBM Plex Sans, monospace" font-size="9" fill="white" font-weight="600">scratch (med) 78%</text>

  <!-- Corner scan indicators -->
  <g stroke="#ff7a52" stroke-width="2" fill="none" opacity="0.7">
    <polyline points="60,80 60,96 76,96"/>
    <polyline points="340,80 356,80 356,96"/>
    <polyline points="60,320 60,304 76,304"/>
    <polyline points="340,320 356,320 356,304"/>
  </g>

  <!-- Scan line animation indicator -->
  <line x1="60" y1="185" x2="360" y2="185" stroke="#ff7a52" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Panel label -->
  <text x="55" y="54" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#a3a8b4" letter-spacing="2">INSPECTION FEED</text>

  <!-- Right panel: report output -->
  <rect x="410" y="60" width="390" height="280" rx="12" fill="#141821" stroke="rgba(245,246,248,0.12)" stroke-width="1"/>

  <text x="425" y="54" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#a3a8b4" letter-spacing="2">INSPECTION REPORT</text>

  <!-- Report header -->
  <rect x="425" y="76" width="360" height="32" rx="6" fill="#1e2430"/>
  <text x="438" y="88" font-family="Space Grotesk, sans-serif" font-size="11" fill="#f5f6f8" font-weight="600">InspectAI — Automated Defect Report</text>
  <text x="438" y="101" font-family="IBM Plex Sans, monospace" font-size="9" fill="#a3a8b4">2025-04-05T14:22:38Z · capsule_crack_014.jpg</text>

  <!-- Status badge -->
  <rect x="680" y="78" width="50" height="22" rx="11" fill="#ef4444" opacity="0.9"/>
  <text x="705" y="93" font-family="Space Grotesk, sans-serif" font-size="9" fill="white" font-weight="700" text-anchor="middle">❌ FAIL</text>

  <!-- Report fields -->
  <g font-family="IBM Plex Sans, monospace" font-size="10">
    <!-- Field rows -->
    <text x="438" y="132" fill="#a3a8b4">defects_found</text>
    <text x="560" y="132" fill="#f5f6f8">2</text>

    <text x="438" y="152" fill="#a3a8b4">overall_status</text>
    <text x="560" y="152" fill="#ef4444" font-weight="600">FAIL</text>

    <text x="438" y="172" fill="#a3a8b4">severity_summary</text>
    <text x="560" y="172" fill="#f5f6f8">{"high": 1, "medium": 1}</text>

    <!-- Defect detail box -->
    <rect x="425" y="183" width="360" height="58" rx="6" fill="#0f1218"/>
    <text x="438" y="196" fill="#ff7a52" font-weight="600">defects[0]</text>
    <text x="438" y="210" fill="#a3a8b4">  label</text>
    <text x="510" y="210" fill="#f5f6f8">crack</text>
    <text x="438" y="222" fill="#a3a8b4">  severity</text>
    <text x="510" y="222" fill="#ef4444">high</text>
    <text x="438" y="234" fill="#a3a8b4">  confidence</text>
    <text x="510" y="234" fill="#f5f6f8">0.94</text>

    <!-- RAG context label -->
    <text x="438" y="262" fill="#a3a8b4">rag_context</text>
    <rect x="425" y="267" width="360" height="32" rx="6" fill="#0f1218" opacity="0.8"/>
    <text x="438" y="280" fill="#a3a8b4">"Per ISO 21920-2021: surface cracks exceeding</text>
    <text x="438" y="292" fill="#a3a8b4"> 0.2mm depth require immediate inspection hold."</text>
  </g>

  <!-- Architecture flow at bottom -->
  <g opacity="0.85">
    <rect x="40" y="370" width="760" height="72" rx="10" fill="#141821" stroke="rgba(245,246,248,0.08)" stroke-width="1"/>

    <!-- Pipeline steps -->
    <!-- Step 1 -->
    <rect x="58" y="385" width="118" height="40" rx="7" fill="#1e2430"/>
    <text x="117" y="402" font-family="Space Grotesk, sans-serif" font-size="10" fill="#ff7a52" font-weight="600" text-anchor="middle">Image Input</text>
    <text x="117" y="415" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="#a3a8b4" text-anchor="middle">Gradio UI upload</text>

    <!-- Arrow -->
    <text x="188" y="407" font-family="sans-serif" font-size="14" fill="#a3a8b4">→</text>

    <!-- Step 2 -->
    <rect x="204" y="385" width="118" height="40" rx="7" fill="#1e2430"/>
    <text x="263" y="402" font-family="Space Grotesk, sans-serif" font-size="10" fill="#ff7a52" font-weight="600" text-anchor="middle">YOLOv8</text>
    <text x="263" y="415" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="#a3a8b4" text-anchor="middle">Defect detection</text>

    <!-- Arrow -->
    <text x="334" y="407" font-family="sans-serif" font-size="14" fill="#a3a8b4">→</text>

    <!-- Step 3 -->
    <rect x="350" y="385" width="118" height="40" rx="7" fill="#1e2430"/>
    <text x="409" y="402" font-family="Space Grotesk, sans-serif" font-size="10" fill="#ff7a52" font-weight="600" text-anchor="middle">RAG + LLM</text>
    <text x="409" y="415" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="#a3a8b4" text-anchor="middle">Report generation</text>

    <!-- Arrow -->
    <text x="480" y="407" font-family="sans-serif" font-size="14" fill="#a3a8b4">→</text>

    <!-- Step 4 -->
    <rect x="496" y="385" width="118" height="40" rx="7" fill="#1e2430"/>
    <text x="555" y="402" font-family="Space Grotesk, sans-serif" font-size="10" fill="#ff7a52" font-weight="600" text-anchor="middle">FAISS Retrieval</text>
    <text x="555" y="415" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="#a3a8b4" text-anchor="middle">Defect standards</text>

    <!-- Arrow -->
    <text x="626" y="407" font-family="sans-serif" font-size="14" fill="#a3a8b4">→</text>

    <!-- Step 5 -->
    <rect x="642" y="385" width="142" height="40" rx="7" fill="#1e2430"/>
    <text x="713" y="402" font-family="Space Grotesk, sans-serif" font-size="10" fill="#ff7a52" font-weight="600" text-anchor="middle">Structured Report</text>
    <text x="713" y="415" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="#a3a8b4" text-anchor="middle">JSON + annotated image</text>
  </g>

  <!-- Title overlay -->
  <text x="425" y="370" font-family="Space Grotesk, sans-serif" font-size="11" fill="#a3a8b4" letter-spacing="2">PIPELINE</text>
</svg>
